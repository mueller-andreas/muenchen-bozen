name: Deploy to GitHub Pages

# Offizieller Pages-Workflow (ohne Build-Schritt): lädt das Repository als
# Artefakt hoch und deployt es in die github-pages-Umgebung.
# `enablement: true` aktiviert GitHub Pages beim ersten Lauf automatisch;
# schlägt das fehl, einmalig manuell aktivieren:
# Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Tests
        run: |
          node --check assets/js/parse.js
          node --check assets/js/app.js
          node --test test/smoke.test.mjs
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
